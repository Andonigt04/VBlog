services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./storage/logs:/var/www/html/storage/logs # Si Nginx necesita logs
    depends_on:
     - laravel
  laraevl:
    build:
      context:
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/html # Código fuente de Laravel
    depends_on:
      postgresql

  postgresql:
    image: postgresql:lastest
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: laravel
