services:
  nginx:
    image: nginx:alpine
    build:
      context: nginx/
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./public:/var/www/html:ro
    depends_on:
     - laravel
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./src:/var/www/html # Código fuente de Laravel
      - pgcontent:/var/www/html/storage
    depends_on:
      - postgresql

  postgresql:
    image: postgres:latest
    environment:
      POSTGRES_ROOT_PASSWORD: "uireh34t34$GTG·%PG·$T*·P·*WP"
      POSTGRES_DB: vblog
      POSTGRES_USER: vblog_adm
      POSTGRES_PASSWORD: "uireh34t34$GTG·%PG·$T*·P·*WP"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  pgcontent: